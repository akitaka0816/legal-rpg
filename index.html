<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>法務クイズ研修</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>法務クイズ研修</h1>
      <p class="subtitle">役職ステージで学ぶ法務・コンプラ（新入社員からCLOまで）</p>

      <!-- コース選択 -->
      <section class="card" id="courseSelectSection">
        <h2>コースを選択</h2>
        <div id="courseGrid" class="course-grid"></div>
      </section>

      <!-- 開始（コース選択後に表示） -->
      <section class="card hidden" id="startSection">
        <h2>研修の開始</h2>
        <button id="backToCourseBtn" class="btn-secondary btn-back">← コース選択に戻る</button>
        <label for="playerName">受講者名</label>
        <input id="playerName" type="text" placeholder="受講者名を入力" />
        <div class="start-buttons">
          <button id="startBtn">▶ 開始</button>
          <button id="showRankingBtn" class="btn-secondary">🏆 ランキング</button>
          <button id="reviewBtn" class="btn-review hidden">📖 復習 <span id="reviewCount" class="review-count">0</span>問</button>
        </div>
        <div class="start-buttons-sub">
          <button id="stageMapBtn" class="btn-secondary">📍 ステージマップ</button>
          <button id="statsBtn" class="btn-secondary">📊 正答率統計</button>
        </div>
      </section>

      <!-- ⑧ ステージマップ -->
      <section class="card hidden" id="stageMapSection">
        <h2>📍 ステージマップ</h2>
        <div id="stageMapGrid" class="stage-map-grid stage-timeline"></div>
        <button class="btn-secondary panel-close-btn" data-close-panel>← トップへ戻る</button>
      </section>

      <!-- ⑤ 正答率統計 -->
      <section class="card hidden" id="statsSection">
        <h2>📊 正答率統計（テーマ別）</h2>
        <div id="statsContent"></div>
        <button id="clearStatsBtn" class="btn-danger">統計をリセット</button>
        <button class="btn-secondary panel-close-btn" data-close-panel>← トップへ戻る</button>
      </section>


      <section class="card hidden" id="rankingSection">
        <h2>🏆 ランキング（Top 5）</h2>
        <div id="rankingList"></div>
        <button id="clearRankingBtn" class="btn-danger">クリア</button>
        <button class="btn-secondary panel-close-btn" data-close-panel>← トップへ戻る</button>
      </section>

      <!-- クイズ中レイアウト：左ステータス ＋ 右クイズ/結果 -->
      <div class="quiz-layout">
        <section class="card hidden" id="statusSection">
          <h2>ステータス</h2>
          <div class="status-grid">
            <div>名前: <span id="sName">-</span></div>
            <div>役職: <span id="sRole">-</span></div>
            <div>段階: <span id="sLv">1</span></div>
            <div>コンディション: <span id="sHp">100</span></div>
            <div>習熟pt: <span id="sExp">0</span></div>
            <div>進行: <span id="sProgress">0/5</span></div>
            <div>ステージ: <span id="sStage">-</span></div>
          </div>
          <div class="status-progress-wrap">
            <div id="statusProgressBar" class="status-progress-bar"></div>
          </div>
          <div class="achievement-wrap">
            <div class="achievement-title">実績</div>
            <div id="achievementList" class="achievement-list">未獲得</div>
          </div>
        </section>

        <div class="quiz-main">
          <!-- ストーリーイントロ -->
          <section class="card hidden" id="stageIntroSection">
            <div id="introChapter" class="intro-chapter"></div>
            <div id="introScene" class="intro-scene"></div>
            <hr class="intro-divider" />
            <p id="introNarrative" class="intro-narrative"></p>
            <div class="intro-skills-wrap">
              <div class="intro-skills-header">── 重点スキル・知識 ──</div>
              <ul id="introSkillsList" class="intro-skills-list"></ul>
            </div>
            <div id="introFinalHint" class="intro-boss-hint"></div>
            <button id="introStartBtn" class="intro-start-btn">クイズを開始する</button>
          </section>

          <section class="card hidden" id="quizSection">
            <div class="quiz-header">
              <h2>クイズ</h2>
              <div id="questionBadge" class="question-badge hidden"></div>
            </div>
            <div class="timer-wrap">
              <div class="timer-bar-bg">
                <div id="timerBar" class="timer-bar"></div>
              </div>
              <span id="timerText" class="timer-text">30秒</span>
              <span id="comboDisplay" class="combo-badge hidden"></span>
            </div>
            <div id="fatalWarning" class="fatal-warning hidden">
              最終問題 — 不正解または時間切れの場合、このステージは終了し、セッションはここまでとなります。
            </div>
            <p id="questionText"></p>
            <div id="choices"></div>
          </section>

          <section class="card hidden" id="resultSection">
            <h2>結果</h2>
            <div id="scoreBanner" class="score-banner hidden">
              <div id="scoreBannerLabel" class="score-banner-label"></div>
              <div id="scoreBannerValue" class="score-banner-value"></div>
            </div>
            <div id="resultGradeBadge" class="result-grade-badge hidden"></div>
            <p id="resultText"></p>
            <div id="explanationBlock" class="explanation-block hidden"></div>
            <button id="nextBtn">次へ</button>
            <button id="restartBtn" class="hidden">最初から</button>
            <button id="sendBtn" class="btn-secondary hidden">📝 結果を送信</button>
            <button id="shareBtn" class="btn-share hidden">📋 結果をコピー</button>
          </section>
        </div>
      </div>
    </main>

    <!-- ステージクリア演出 -->
    <div id="stageClearOverlay" class="stage-clear-overlay hidden">
      <div class="stage-clear-box">
        <div class="stage-clear-title">ステージ修了</div>
        <div id="stageClearNum" class="stage-clear-num"></div>
        <div id="stageClearRole" class="stage-clear-role"></div>
        <div id="stageClearGrade" class="stage-clear-grade-badge"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>

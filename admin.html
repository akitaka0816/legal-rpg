<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法務クイズ研修 — 問題編集ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }

  /* ヘッダー */
  header { background: #16213e; padding: 16px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 2px solid #0f3460; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; color: #e2b96f; }
  .header-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }

  /* ボタン */
  button { cursor: pointer; border: none; border-radius: 6px; font-size: 14px; padding: 8px 16px; font-family: inherit; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  .btn-primary { background: #e2b96f; color: #1a1a2e; font-weight: bold; }
  .btn-secondary { background: #0f3460; color: #e0e0e0; border: 1px solid #2a4a80; }
  .btn-danger { background: #8b1a1a; color: #f0d0d0; }
  .btn-small { padding: 4px 10px; font-size: 12px; }
  button:disabled { opacity: 0.4; cursor: default; }

  /* ドロップゾーン */
  #drop-zone { border: 2px dashed #0f3460; border-radius: 12px; padding: 60px; text-align: center; margin: 40px auto; max-width: 600px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  #drop-zone:hover, #drop-zone.drag-over { border-color: #e2b96f; background: rgba(226,185,111,0.05); }
  #drop-zone p { color: #888; margin-top: 8px; font-size: 14px; }
  #drop-zone .icon { font-size: 48px; margin-bottom: 12px; }
  #file-input { display: none; }

  /* メインレイアウト */
  #editor { display: none; }
  .layout { display: flex; height: calc(100vh - 57px); }

  /* サイドバー（問題リスト） */
  #sidebar { width: 280px; min-width: 280px; background: #16213e; border-right: 1px solid #0f3460; overflow-y: auto; display: flex; flex-direction: column; }
  #sidebar-header { padding: 12px; border-bottom: 1px solid #0f3460; display: flex; gap: 8px; flex-direction: column; }
  #search { width: 100%; background: #0f3460; border: 1px solid #2a4a80; border-radius: 6px; color: #e0e0e0; padding: 6px 10px; font-size: 13px; font-family: inherit; }
  #search::placeholder { color: #666; }
  .filter-row { display: flex; gap: 6px; }
  select.filter { flex: 1; background: #0f3460; border: 1px solid #2a4a80; border-radius: 6px; color: #e0e0e0; padding: 5px 8px; font-size: 12px; font-family: inherit; }
  #q-list { flex: 1; overflow-y: auto; }
  .q-item { padding: 10px 12px; border-bottom: 1px solid #0f1a30; cursor: pointer; display: flex; gap: 8px; align-items: flex-start; transition: background 0.1s; }
  .q-item:hover { background: #1e2d50; }
  .q-item.active { background: #0f3460; border-left: 3px solid #e2b96f; }
  .q-item.modified { border-left: 3px solid #e26f6f; }
  .q-item.active.modified { border-left: 3px solid #e2b96f; }
  .q-num { font-size: 11px; color: #888; min-width: 36px; }
  .q-preview { font-size: 12px; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .q-meta { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: #0f3460; color: #aac; }
  .badge.stage { background: #1a3020; color: #6c6; }
  .sidebar-footer { padding: 8px 12px; border-top: 1px solid #0f3460; font-size: 12px; color: #666; }

  /* 編集パネル */
  #panel { flex: 1; overflow-y: auto; padding: 24px; }
  #no-selection { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 16px; }

  /* フォーム */
  .form-card { background: #16213e; border: 1px solid #0f3460; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .form-card h3 { font-size: 14px; color: #e2b96f; margin-bottom: 14px; border-bottom: 1px solid #0f3460; padding-bottom: 8px; }
  .form-row { margin-bottom: 14px; }
  label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
  input[type="text"], textarea, select.form-select {
    width: 100%; background: #0d1b30; border: 1px solid #2a4a80; border-radius: 6px;
    color: #e0e0e0; padding: 8px 10px; font-size: 14px; font-family: inherit;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus, select.form-select:focus { outline: none; border-color: #e2b96f; }
  textarea { resize: vertical; line-height: 1.6; }
  .choices-grid { display: grid; gap: 8px; }
  .choice-row { display: flex; gap: 8px; align-items: center; }
  .choice-row input[type="radio"] { cursor: pointer; accent-color: #e2b96f; width: 16px; height: 16px; flex-shrink: 0; }
  .choice-label { font-size: 12px; color: #888; min-width: 20px; }
  .answer-hint { font-size: 11px; color: #e2b96f; margin-top: 4px; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tags-input-wrap { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tag-chip { background: #0f3460; color: #aac; font-size: 12px; padding: 2px 8px; border-radius: 4px; display: flex; align-items: center; gap: 4px; }
  .tag-chip .remove { cursor: pointer; color: #e26f6f; font-size: 14px; line-height: 1; }
  .tag-add { background: #0f3460; border: 1px dashed #2a4a80; border-radius: 4px; color: #aaa; padding: 3px 8px; font-size: 12px; cursor: pointer; }

  /* パネルヘッダー */
  .panel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .panel-header h2 { font-size: 16px; color: #e2b96f; }
  .panel-actions { margin-left: auto; display: flex; gap: 8px; }

  /* 変更インジケーター */
  .modified-dot { width: 8px; height: 8px; border-radius: 50%; background: #e26f6f; display: inline-block; }

  /* 追加モーダル */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #16213e; border: 1px solid #0f3460; border-radius: 12px; padding: 24px; width: 400px; max-width: 90vw; }
  .modal h3 { color: #e2b96f; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* 通知 */
  #toast { position: fixed; bottom: 24px; right: 24px; background: #1e3a20; color: #8de88d; border: 1px solid #2d5a30; border-radius: 8px; padding: 12px 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 300; }
  #toast.show { opacity: 1; }

  /* スクロールバー */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0d1b30; }
  ::-webkit-scrollbar-thumb { background: #2a4a80; border-radius: 3px; }
</style>
</head>
<body>

<div id="drop-screen">
  <header>
    <h1>法務クイズ研修 — 問題編集ツール</h1>
    <div class="header-actions">
      <span style="font-size:12px;color:#666;">questions.json を読み込んでください</span>
    </div>
  </header>
  <div id="drop-zone">
    <div class="icon">📂</div>
    <div style="font-size:18px;color:#e2b96f;">questions.json をドロップ</div>
    <p>またはクリックしてファイルを選択</p>
    <input type="file" id="file-input" accept=".json">
  </div>
</div>

<div id="editor">
  <header>
    <h1>法務クイズ研修 — 問題編集ツール</h1>
    <div class="header-actions">
      <span id="modified-count" style="font-size:12px;color:#e26f6f;"></span>
      <button class="btn-secondary btn-small" onclick="addQuestion()">＋ 問題追加</button>
      <button class="btn-primary" onclick="downloadJSON()">💾 JSONをダウンロード</button>
      <button class="btn-secondary btn-small" onclick="reloadFile()">別ファイルを開く</button>
    </div>
  </header>
  <div class="layout">
    <div id="sidebar">
      <div id="sidebar-header">
        <input type="text" id="search" placeholder="問題文・テーマで検索..." oninput="renderList()">
        <div class="filter-row">
          <select class="filter" id="filter-course" onchange="renderList()">
            <option value="">全コース</option>
          </select>
          <select class="filter" id="filter-stage" onchange="renderList()">
            <option value="">全ステージ</option>
          </select>
          <select class="filter" id="filter-theme" onchange="renderList()">
            <option value="">全テーマ</option>
          </select>
        </div>
      </div>
      <div id="q-list"></div>
      <div class="sidebar-footer" id="list-count"></div>
    </div>
    <div id="panel">
      <div id="no-selection">← 左のリストから問題を選択してください</div>
      <div id="form-area" style="display:none;"></div>
    </div>
  </div>
</div>

<!-- 新問題追加モーダル -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>問題を追加</h3>
    <div class="form-row">
      <label>コース（空=総合 / 例: ppc）</label>
      <input type="text" id="new-course" placeholder="">
    </div>
    <div class="form-row">
      <label>ID（例: q101）</label>
      <input type="text" id="new-id" placeholder="q101">
    </div>
    <div class="form-row">
      <label>テーマ</label>
      <input type="text" id="new-theme" placeholder="会社法">
    </div>
    <div class="form-row">
      <label>ステージ（1〜6）</label>
      <input type="text" id="new-stage" placeholder="1">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeAddModal()">キャンセル</button>
      <button class="btn-primary" onclick="confirmAddQuestion()">追加</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let questions = [];
let filteredIndices = [];
let currentIndex = null;
let modifiedSet = new Set();
let pendingChanges = {};
const DEFAULT_COURSE = 'general';

// ---- ファイル読み込み ----
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); loadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) {
        alert('questions.json は配列（[ ... ]）形式である必要があります。');
        return;
      }
      questions = data;
      init();
    } catch(err) {
      alert('JSONの解析に失敗しました: ' + err.message);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function init() {
  document.getElementById('drop-screen').style.display = 'none';
  document.getElementById('editor').style.display = 'block';
  modifiedSet.clear();
  pendingChanges = {};
  currentIndex = null;
  populateFilters();
  renderList();
}

function reloadFile() {
  if (modifiedSet.size > 0 && !confirm('未保存の変更があります。別ファイルを開きますか？')) return;
  document.getElementById('drop-screen').style.display = 'block';
  document.getElementById('editor').style.display = 'none';
  fileInput.value = '';
}

// ---- フィルター ----
function populateFilters() {
  const courses = [...new Set(questions.map(q => q.course || DEFAULT_COURSE))].sort();
  const stages = [...new Set(questions.map(q => q.stage).filter(s => s != null))].sort((a,b)=>a-b);
  const themes = [...new Set(questions.map(q => q.theme).filter(Boolean))].sort();
  const courseEl = document.getElementById('filter-course');
  const stageEl = document.getElementById('filter-stage');
  const themeEl = document.getElementById('filter-theme');
  if (courseEl) {
    courseEl.innerHTML =
      '<option value="">全コース</option>' +
      courses.map(c => `<option value="${escAttr(c)}">${escHtml(c)}</option>`).join('');
  }
  stageEl.innerHTML = '<option value="">全ステージ</option>' + stages.map(s => `<option value="${s}">ステージ${s}</option>`).join('');
  themeEl.innerHTML = '<option value="">全テーマ</option>' + themes.map(t => `<option value="${t}">${t}</option>`).join('');
}

// ---- リスト描画 ----
function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const course = document.getElementById('filter-course')?.value;
  const stage = document.getElementById('filter-stage').value;
  const theme = document.getElementById('filter-theme').value;

  filteredIndices = [];
  questions.forEach((item, i) => {
    if (course && String(item.course || DEFAULT_COURSE) !== course) return;
    if (q && !item.text?.toLowerCase().includes(q) && !item.theme?.toLowerCase().includes(q) && !item.id?.toLowerCase().includes(q)) return;
    if (stage && String(item.stage) !== stage) return;
    if (theme && item.theme !== theme) return;
    filteredIndices.push(i);
  });

  const list = document.getElementById('q-list');
  list.innerHTML = filteredIndices.map(i => {
    const item = questions[i];
    const isActive = i === currentIndex ? 'active' : '';
    const isMod = modifiedSet.has(i) ? 'modified' : '';
    const courseId = String(item.course || DEFAULT_COURSE);
    return `<div class="q-item ${isActive} ${isMod}" onclick="selectQuestion(${i})">
      <div style="flex:1">
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px;">
          <span class="q-num">${item.id}</span>
          ${isMod ? '<span class="modified-dot" title="変更あり"></span>' : ''}
        </div>
        <div class="q-preview">${escHtml(item.text || '')}</div>
        <div class="q-meta">
          <span class="badge">${escHtml(courseId)}</span>
          <span class="badge stage">S${item.stage}</span>
          <span class="badge">${escHtml(item.theme || '')}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('list-count').textContent = `${filteredIndices.length} / ${questions.length} 件`;
}

// ---- 問題選択 ----
function selectQuestion(i) {
  if (currentIndex === i) return;
  flushCurrentEdits();
  currentIndex = i;
  renderList();
  renderForm(i);
}

function renderForm(i) {
  const q = questions[i];
  document.getElementById('no-selection').style.display = 'none';
  const fa = document.getElementById('form-area');
  fa.style.display = 'block';

  const choicesHtml = (q.choices || ['','','','']).map((c, ci) => `
    <div class="choice-row">
      <input type="radio" name="answer" value="${ci}" ${q.answer === ci ? 'checked' : ''} id="choice-radio-${ci}">
      <span class="choice-label">${ci}</span>
      <input type="text" id="choice-${ci}" value="${escAttr(c)}" placeholder="選択肢 ${ci}" style="flex:1">
    </div>
  `).join('');

  const tagsHtml = (q.tags || []).map(t => `
    <span class="tag-chip">${escHtml(t)}<span class="remove" onclick="removeTag(this,'${escAttr(t)}')">×</span></span>
  `).join('');

  fa.innerHTML = `
    <div class="panel-header">
      <h2>${escHtml(q.id)} の編集</h2>
      <div class="panel-actions">
        <button class="btn-danger btn-small" onclick="deleteQuestion(${i})">削除</button>
      </div>
    </div>

    <div class="form-card">
      <h3>基本情報</h3>
      <div class="meta-grid">
        <div class="form-row">
          <label>ID</label>
          <input type="text" id="f-id" value="${escAttr(q.id||'')}">
        </div>
        <div class="form-row">
          <label>テーマ</label>
          <input type="text" id="f-theme" value="${escAttr(q.theme||'')}">
        </div>
        <div class="form-row">
          <label>コース（空=総合 / 例: ppc）</label>
          <input type="text" id="f-course" value="${escAttr(String(q.course||''))}">
        </div>
        <div class="form-row">
          <label>ステージ（1〜6）</label>
          <input type="text" id="f-stage" value="${escAttr(String(q.stage??''))}">
        </div>
      </div>
      <div class="form-row">
        <label>タグ</label>
        <div class="tags-input-wrap" id="tags-wrap">
          ${tagsHtml}
          <button class="tag-add" onclick="addTag()">＋ タグ追加</button>
        </div>
      </div>
      <div class="form-row">
        <label>
          <input type="checkbox" id="f-fatal" ${q.fatal ? 'checked' : ''} style="accent-color:#e26f6f">
          &nbsp;fatal フラグ（現行の研修プレイ画面では未使用。データ互換のため保持）
        </label>
      </div>
    </div>

    <div class="form-card">
      <h3>問題文</h3>
      <div class="form-row">
        <textarea id="f-text" rows="4">${escHtml(q.text||'')}</textarea>
      </div>
    </div>

    <div class="form-card">
      <h3>選択肢と正答</h3>
      <div class="choices-grid">${choicesHtml}</div>
      <div class="answer-hint">ラジオボタンで正答を選択してください（現在: 選択肢 ${q.answer}「${escHtml((q.choices||[])[q.answer]||'')}」）</div>
    </div>

    <div class="form-card">
      <h3>解説</h3>
      <div class="form-row">
        <textarea id="f-explanation" rows="8">${escHtml(q.explanation||'')}</textarea>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-bottom:32px;">
      <button class="btn-primary" onclick="saveCurrentEdits(${i})">この問題の変更を確定</button>
      <button class="btn-secondary" onclick="revertQuestion(${i})">変更を元に戻す</button>
    </div>
  `;
}

// ---- 編集フラッシュ・保存 ----
function flushCurrentEdits() {
  if (currentIndex === null) return;
  saveCurrentEdits(currentIndex, true);
}

function saveCurrentEdits(i, silent) {
  const q = questions[i];
  const get = id => { const el = document.getElementById(id); return el ? el.value : null; };
  const { hint: _omitHint, difficulty: _omitDiff, ...qNoHint } = q;

  const newChoices = [0,1,2,3].map(ci => get(`choice-${ci}`) ?? (q.choices||[])[ci] ?? '');
  const answerEl = document.querySelector('input[name="answer"]:checked');
  const newAnswer = answerEl ? parseInt(answerEl.value) : q.answer;

  const rawCourse = String(get('f-course') ?? q.course ?? '').trim();
  const courseVal = rawCourse === '' || rawCourse === DEFAULT_COURSE ? undefined : rawCourse;

  const newQ = {
    ...qNoHint,
    id: get('f-id') ?? q.id,
    theme: get('f-theme') ?? q.theme,
    ...(courseVal ? { course: courseVal } : {}),
    stage: Math.max(1, Math.min(6, parseInt(get('f-stage'), 10) || q.stage || 1)),
    text: get('f-text') ?? q.text,
    choices: newChoices,
    answer: newAnswer,
    explanation: get('f-explanation') ?? q.explanation,
    fatal: document.getElementById('f-fatal')?.checked ?? q.fatal,
    tags: getCurrentTags(),
  };

  const changed = JSON.stringify(newQ) !== JSON.stringify(q);
  if (changed) {
    questions[i] = newQ;
    modifiedSet.add(i);
    updateModifiedCount();
    if (!silent) { showToast('変更を確定しました'); renderList(); }
  } else {
    if (!silent) showToast('変更はありません');
  }
}

function revertQuestion(i) {
  if (!modifiedSet.has(i)) { showToast('変更はありません'); return; }
  // pendingChanges に元データが必要なケースは未対応。ここではリロードを促す
  if (!confirm('この問題の変更を元に戻します。ファイルを再読み込みすると初期状態に戻ります。\n（現在は編集前データが残っていないため、ダウンロード前のJSONで上書きしてください）')) return;
  modifiedSet.delete(i);
  updateModifiedCount();
  renderList();
}

function deleteQuestion(i) {
  if (!confirm(`${questions[i].id} を削除しますか？`)) return;
  const prevModified = new Set(modifiedSet);
  questions.splice(i, 1);
  modifiedSet.clear();
  prevModified.forEach(mi => {
    if (mi < i) modifiedSet.add(mi);
    else if (mi > i) modifiedSet.add(mi - 1);
  });
  currentIndex = null;
  document.getElementById('no-selection').style.display = 'flex';
  document.getElementById('form-area').style.display = 'none';
  populateFilters();
  renderList();
  showToast('削除しました');
}

function getCurrentTags() {
  const chips = document.querySelectorAll('#tags-wrap .tag-chip');
  return Array.from(chips).map(el => el.textContent.replace('×','').trim());
}

// ---- タグ操作 ----
function removeTag(el, tag) {
  el.parentElement.remove();
}

function addTag() {
  const name = prompt('タグ名を入力:');
  if (!name || !name.trim()) return;
  const wrap = document.getElementById('tags-wrap');
  const chip = document.createElement('span');
  chip.className = 'tag-chip';
  chip.innerHTML = `${escHtml(name.trim())}<span class="remove" onclick="removeTag(this,'${escAttr(name.trim())}')">×</span>`;
  wrap.insertBefore(chip, wrap.querySelector('.tag-add'));
}

// ---- 問題追加 ----
function suggestNextId() {
  let max = 0;
  questions.forEach(q => {
    const m = /^q(\d+)$/i.exec(String(q.id || ''));
    if (m) max = Math.max(max, parseInt(m[1], 10));
  });
  return 'q' + String(max + 1).padStart(3, '0');
}

function addQuestion() {
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('new-course').value = '';
  document.getElementById('new-id').value = suggestNextId();
  document.getElementById('new-theme').value = '';
  document.getElementById('new-stage').value = '1';
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}

function confirmAddQuestion() {
  const rawCourse = String(document.getElementById('new-course').value || '').trim();
  const courseVal = rawCourse === '' || rawCourse === DEFAULT_COURSE ? undefined : rawCourse;
  const id = document.getElementById('new-id').value.trim();
  const theme = document.getElementById('new-theme').value.trim();
  const stage = Math.max(1, Math.min(6, parseInt(document.getElementById('new-stage').value, 10) || 1));
  if (!id) { alert('IDを入力してください'); return; }
  if (questions.some(q => q.id === id)) { alert('このIDは既に存在します'); return; }

  const newQ = {
    id, theme, ...(courseVal ? { course: courseVal } : {}), tags: [],
    text: '', choices: ['', '', '', ''], answer: 0,
    explanation: '', stage, fatal: false
  };
  questions.push(newQ);
  closeAddModal();
  populateFilters();
  renderList();
  selectQuestion(questions.length - 1);
  showToast('問題を追加しました');
}

// ---- ダウンロード ----
function downloadJSON() {
  flushCurrentEdits();
  for (let idx = 0; idx < questions.length; idx++) {
    const qq = questions[idx];
    const ans = qq.answer;
    const ch = qq.choices || [];
    if (typeof ans !== 'number' || ans < 0 || ans >= ch.length) {
      alert(`問題 ${qq.id}: 正答インデックスが選択肢の範囲外です（answer=${ans}, 選択肢数=${ch.length}）。修正してから保存してください。`);
      selectQuestion(idx);
      return;
    }
    const st = Number(qq.stage);
    if (!Number.isFinite(st) || st < 1 || st > 6) {
      alert(`問題 ${qq.id}: ステージは 1〜6 の整数にしてください（現在: ${qq.stage}）。`);
      selectQuestion(idx);
      return;
    }
    if (qq.course != null) {
      const c = String(qq.course).trim();
      if (!c) {
        alert(`問題 ${qq.id}: course は空文字にせず、未指定（削除）またはID（例: ppc）にしてください。`);
        selectQuestion(idx);
        return;
      }
      if (c === DEFAULT_COURSE) {
        alert(`問題 ${qq.id}: 総合コースは course を未指定（削除）にしてください（${DEFAULT_COURSE} の明示指定は不要）。`);
        selectQuestion(idx);
        return;
      }
    }
  }
  const blob = new Blob([JSON.stringify(questions, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'questions.json';
  a.click();
  modifiedSet.clear();
  updateModifiedCount();
  renderList();
  showToast('ダウンロードしました！ questions.json に上書き保存してください。');
}

// ---- ヘルパー ----
function updateModifiedCount() {
  const el = document.getElementById('modified-count');
  el.textContent = modifiedSet.size > 0 ? `${modifiedSet.size}件 未保存` : '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return String(str).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
